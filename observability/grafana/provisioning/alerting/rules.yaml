apiVersion: 1
groups:
  - orgId: 1
    name: aura-backend-alerts
    folder: Aura Alerts
    interval: 10s
    rules:
      - uid: aura-error-rate-alert
        title: Aura Backend Error Rate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({job="aura-backend"} |= `error` [1m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
              expression: A
        noDataState: OK
        execErrState: Error
        for: 10s
        labels:
          service: aura-backend
          severity: critical
        annotations:
          summary: "High error rate detected in aura-backend checkout flow"
          description: "Multiple errors detected in the last minute. Possible database or payment gateway issue."
