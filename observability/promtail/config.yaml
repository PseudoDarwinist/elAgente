server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: app-logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            msg: msg
      - labels:
          level:
          service:
    static_configs:
      - targets: [localhost]
        labels:
          job: app
          __path__: /var/log/app/*.log



  - job_name: aura-backend-logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            msg: message
            error: error
            method: method
            path: path
            status: status
            duration_ms: duration_ms
      - labels:
          level:
          service:
    static_configs:
      - targets: [localhost]
        labels:
          job: aura-backend
          __path__: /var/log/aura-backend/*.log
