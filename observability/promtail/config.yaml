server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: app-logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            msg: msg
      - labels:
          level:
          service:
    static_configs:
      - targets: [localhost]
        labels:
          job: app
          __path__: /var/log/app/*.log

  - job_name: demo-app-logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            msg: msg
            error: error
            latency_ms: latency_ms
            db_pool_used: db_pool_used
            file: file
            line: line
      - labels:
          level:
          service:
    static_configs:
      - targets: [localhost]
        labels:
          job: demo-app
          __path__: /var/log/demo-app/*.log
