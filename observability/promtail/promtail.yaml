server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: app
          service: ${PROMTAIL_SERVICE_NAME:-salesforce}
          env: ${PROMTAIL_ENV:-dev}
          __path__: /var/log/app/*.log

  - job_name: promptbuilder-logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
      - labels:
          level:
    static_configs:
      - targets: [localhost]
        labels:
          job: promptbuilder
          service: promptbuilder
          env: dev
          __path__: /var/log/promptbuilder/*.log







