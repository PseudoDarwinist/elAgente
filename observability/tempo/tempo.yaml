# Grafana Tempo Configuration for SRE Agent
# Purpose: Collect distributed traces and build service dependency graph

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

# Enable metrics generator for service graphs
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: sre-agent-local
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
  traces_storage:
    path: /tmp/tempo/generator/traces
  processor:
    service_graphs:
      dimensions:
        - service.name
        - service.namespace
      histogram_buckets: [0.1, 0.5, 1, 2, 5, 10]
      wait: 10s
      max_items: 10000
    span_metrics:
      dimensions:
        - service.name
        - http.method
        - http.status_code

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
