services:
  # Tempo - Distributed tracing for topology discovery
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: "0"  # Run as root to avoid permission issues
    ports:
      - "3200:3200"   # Tempo API (query traces, service graph)
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus - Metrics for service health monitoring
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    user: "0"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  grafana:
    image: grafana/grafana:10.4.6
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=grafanaAlerting
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - ./logs/app:/var/log/app:ro
      - ./aura-quiet-living/backend/logs:/var/log/aura-backend:ro
      - ./services/postgres-mock/logs:/var/log/postgres-mock:ro
      - ./services/redis-mock/logs:/var/log/redis-mock:ro
      - ./services/stripe-mock/logs:/var/log/stripe-mock:ro
    depends_on:
      - loki
  slack:
    build:
      context: sre_agent
      dockerfile: servers/slack/Dockerfile
    ports:
      - "3101:3001"
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_TEAM_ID=${SLACK_TEAM_ID}
      - TRANSPORT=SSE
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3001"]
      interval: 5s
      timeout: 3s
      retries: 5

  github:
    build:
      context: sre_agent
      dockerfile: servers/github/Dockerfile
    ports:
      - "3102:3001"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - TRANSPORT=SSE
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3001"]
      interval: 5s
      timeout: 3s
      retries: 5

  loki-mcp:
    build:
      context: sre_agent
      dockerfile: servers/loki/Dockerfile
    ports:
      - "3103:3001"
    environment:
      - LOKI_URL=http://loki:3100
      - TRANSPORT=SSE
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3001"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      default:
        aliases:
          - loki-mcp

  # Topology MCP - queries Tempo for service dependencies
  topology-mcp:
    build:
      context: sre_agent
      dockerfile: servers/topology-server/Dockerfile
    ports:
      - "3104:3001"
    environment:
      - TEMPO_URL=http://tempo:3200
      - TRANSPORT=SSE
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3001"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      default:
        aliases:
          - topology-mcp

  # Prometheus MCP - queries Prometheus for service health metrics
  prometheus-mcp:
    build:
      context: sre_agent
      dockerfile: servers/prometheus-server/Dockerfile
    ports:
      - "3105:3001"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - TRANSPORT=SSE
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3001"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      default:
        aliases:
          - prometheus-mcp

  prompt-server:
    build:
      context: .
      dockerfile: sre_agent/servers/prompt_server/Dockerfile
    environment:
      - GITHUB_ORGANISATION=${GITHUB_ORGANISATION}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME}
      - PROJECT_ROOT=${PROJECT_ROOT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  llm-server:
    build:
      context: .
      dockerfile: sre_agent/llm/Dockerfile
    environment:
      - PROVIDER=${PROVIDER}
      - MODEL=${MODEL}
      - MAX_TOKENS=${MAX_TOKENS:-4000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  llama-firewall:
    build:
      context: .
      dockerfile: sre_agent/firewall/Dockerfile
    volumes:
      - source: ~/.cache/huggingface
        target: /root/.cache/huggingface
        type: bind
        bind:
          create_host_path: true
    environment:
      - HF_TOKEN=${HF_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: sre_agent/client/Dockerfile
    ports:
      - "8003:80"
    depends_on:
      slack:
        condition: service_healthy
      github:
        condition: service_healthy
      loki-mcp:
        condition: service_healthy
      prompt-server:
        condition: service_healthy
    environment:
      - DEV_BEARER_TOKEN=${DEV_BEARER_TOKEN}
      - QUERY_TIMEOUT=300
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - TOOLS=${TOOLS}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID}
      - SERVICES=${SERVICES}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALERT_WEBHOOK_SECRET=${ALERT_WEBHOOK_SECRET}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - GEMINI_EMBED_MODEL=${GEMINI_EMBED_MODEL:-text-embedding-004}
      - ENABLED_SERVERS=${ENABLED_SERVERS}
      - FIREWALL_ENABLED=false
      - USE_AGENT_WORKER=true
      - AGENT_WORKER_URL=http://host.docker.internal:3005

  # Claude Agent SDK Worker - uses Pro subscription for LLM
  agent-worker:
    build:
      context: sre_agent/agent-worker
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - LOKI_MCP_URL=http://loki-mcp:3001/sse
      - TOPOLOGY_MCP_URL=http://topology-mcp:3001/sse
      - PROMETHEUS_MCP_URL=http://prometheus-mcp:3001/sse
      - SLACK_MCP_URL=http://slack:3001/sse
      - GITHUB_MCP_URL=http://github:3001/sse
    volumes:
      # Mount Claude credentials for Pro subscription authentication
      - ~/.claude:/root/.claude:ro
    depends_on:
      slack:
        condition: service_healthy
      github:
        condition: service_healthy
      loki-mcp:
        condition: service_healthy
      topology-mcp:
        condition: service_healthy
      prometheus-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Mock Postgres Database Service
  postgres-mock:
    build:
      context: services/postgres-mock
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    volumes:
      - ./services/postgres-mock/logs:/app/logs
    environment:
      - OTEL_SERVICE_NAME=postgres-mock
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - PORT=5432
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5432/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Mock Redis Cache Service
  redis-mock:
    build:
      context: services/redis-mock
      dockerfile: Dockerfile
    ports:
      - "6379:6379"
    volumes:
      - ./services/redis-mock/logs:/app/logs
    environment:
      - OTEL_SERVICE_NAME=redis-mock
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - PORT=6379
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6379/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Mock Stripe Payment API Service
  stripe-mock:
    build:
      context: services/stripe-mock
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./services/stripe-mock/logs:/app/logs
    environment:
      - OTEL_SERVICE_NAME=stripe-mock
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - PORT=8081
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  aura-backend:
    build:
      context: aura-quiet-living/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./aura-quiet-living/backend/logs:/app/logs
    environment:
      - OTEL_SERVICE_NAME=aura-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - POSTGRES_URL=http://postgres-mock:5432
      - REDIS_URL=http://redis-mock:6379
      - STRIPE_URL=http://stripe-mock:8081
    depends_on:
      tempo:
        condition: service_healthy
      postgres-mock:
        condition: service_healthy
      redis-mock:
        condition: service_healthy
      stripe-mock:
        condition: service_healthy


  aura-frontend:
    build:
      context: aura-quiet-living
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - aura-backend

volumes:
  qdrant_storage:
  loki_data:
  tempo_data:
  prometheus_data:

